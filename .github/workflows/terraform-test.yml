name: Terraform Test

on:
  pull_request:
  push:
    branches:
      - feat/docsreadme

permissions:
  contents: read
  id-token: write

jobs:
  terraform-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (Root)
        run: terraform init -backend=false

      - name: Terraform Validate (Root)
        run: terraform validate

      - name: Terraform Plan (Root)
        run: terraform plan -input=false

  module-tests:
    runs-on: ubuntu-latest
    needs: terraform-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init (Root)
        run: terraform init -backend=false

      - name: Run Terraform Native Tests
        run: terraform test

      - name: Test All Example Configurations
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "examples" ]; then
            echo "No examples/ directory; skipping."
            exit 0
          fi

          while IFS= read -r -d '' dir; do
            if ! compgen -G "${dir}/*.tf" > /dev/null; then
              continue
            fi

            echo "Testing example: ${dir}"
            terraform -chdir="${dir}" init -backend=false
            terraform -chdir="${dir}" validate
            terraform -chdir="${dir}" plan -input=false
          done < <(find examples -type d -print0)

  lint:
    name: TFLint
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@v2
    secrets:
      GITHUB: ${{ secrets.GITHUB }}

  security-scan:
    name: Checkov
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/security-checkov.yml@v2
    with:
      directory: '.'
      continue_on_error: 'true'
      skip_check: 'CKV_TF_1'
